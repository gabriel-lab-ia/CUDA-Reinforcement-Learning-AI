name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -v --cov=src/cuda_rl --cov-report=term-missing

  native-cuda:
    name: Native CUDA smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure when nvcc exists
        run: |
          if command -v nvcc; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
          else
            echo "nvcc not available on this runner; skipping native CUDA build."
          fi
